<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>EzyBIM - Redirecting...</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // MIT License
      // https://github.com/rafgraph/spa-github-pages
      // This script takes the current url and converts the path and query
      // into a single query parameter that can be read by the index.html page.
      //
      // If you're using a project site (username.github.io/repo-name), 
      // set pathSegmentsToKeep to 1. 
      // If you're using a custom domain or a user/organization site 
      // (username.github.io), set pathSegmentsToKeep to 0.
      var pathSegmentsToKeep = 1;

      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );

    </script>
  </head>
  <body>
  </body>
</html>
